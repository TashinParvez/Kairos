<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title and Description Input</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap links -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>

</head>

<body>

    <!-- extra Large Modal For Interest Page -->

    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModalXl">
        Extra large modal
    </button>

    <div class="modal fade" id="exampleModalXl" data-bs-backdrop="static" tabindex="-1" aria-labelledby="exampleModalXlLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl" style="width: 85%;">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title h4" id="exampleModalXlLabel">Your Interest</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" style="justify-content:center; align-items:center;">
                    <!-- main-Body -->
                    <!-- Checkboxes -->
                    What is your first school's name?
                    <br>
                    <input class="form-control" type="text" placeholder="Your answer" aria-label="default input example">
                    What is your first pet name?
                    <br>
                    <input class="form-control" type="text" placeholder="Your answer" aria-label="default input example">
                    First city you lived in?
                    <br>
                    <input class="form-control" type="text" placeholder="Your answer" aria-label="default input example">
                    What is your date of birth?
                    <br>
                    <input class="form-control" type="text" placeholder="Your answer" aria-label="default input example">
                </div>
                <div class="container d-flex justify-content-end">
                    <button type="submit" name="save" class="btn btn-outline-secondary">Next</button>
                </div>
                <br>
            </div>
        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</html>
